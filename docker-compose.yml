services:

  frontoffice:
    build: ./frontoffice
    ports:
      - "5173:5173"
    volumes:
      - ./frontoffice:/app
    depends_on:
      - backoffice

  backoffice:
    build: ./backoffice
    ports:
      - "3000:3000"
    volumes:
      - ./backoffice:/app
    depends_on:
      - database
    environment:
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=iran_news

  database:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iran_news
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: